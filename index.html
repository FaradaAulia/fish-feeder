<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fish Feeder IoT</title>

<link rel="stylesheet" href="assets/css/style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>
<body>

<div class="container">

  <!-- HEADER -->

  <div class="hero">

    <div>

      <h1>🐟 Fish Feeder IoT</h1>

      <p>
        Smart Aquarium Monitoring System
      </p>

    </div>

    <div id="device-status">

      🟢 Online

    </div>

  </div>

  <!-- MAIN GRID -->

  <div class="dashboard">

    <!-- FEED -->

    <div class="feed-card">

      <div class="feed-icon">
        🐟
      </div>

      <div>
        <h2>
          Beri Pakan
        </h2>

        <p>
          Klik untuk memberi makan ikan
        </p>
      </div>

      <button id="feedBtn">
        Beri Pakan
      </button>

    </div>

    <!-- CHART -->

    <div class="chart-card">

      <div class="card-title">
        Grafik Sensor
      </div>

      <div class="chart-wrapper">
        <canvas id="sensorChart"></canvas>
      </div>

    </div>

    <!-- SUHU -->

    <div class="metric-card">

      <span>
        Suhu
      </span>

      <h2 id="suhu">
        --
      </h2>

    </div>

    <!-- HUMIDITY -->

    <div class="metric-card">

      <span>
        Kelembapan
      </span>

      <h2 id="kelembapan">
        --
      </h2>

    </div>

    <!-- STATUS -->

    <div class="metric-card">

      <span>
        Status
      </span>

      <h2 id="status">
        --
      </h2>

    </div>

    <!-- HISTORY -->

    <div class="history-card">

      <div class="card-title">
        Riwayat Pakan
      </div>

      <ul id="feed-history"></ul>

    </div>

    <!-- SUMMARY -->

    <div class="summary-card">

      <div class="summary-item">

        <span>Suhu Saat Ini</span>

        <h3 id="avg-suhu">
          --
        </h3>

      </div>

      <div class="summary-item">

        <span>Kelembapan</span>

        <h3 id="avg-hum">
          --
        </h3>

      </div>

      <div class="summary-item">

        <span>Total Pakan</span>

        <h3 id="total-feed">
          --
        </h3>

      </div>

    </div>

  </div>

</div>

<script src="assets/js/app.js"></script>

</body>
</html>
